trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
# Step 1: Checkout code from GitHub
- checkout: self

# Step 2: Move into project folder and install dependencies
- script: |
    cd "SC PROJECT (AI-Assisted recruitment simulation system)"
    npm install
  displayName: "Install Node.js Dependencies"

# Step 3: Run basic test script (pipeline verification)
- script: |
    cd "SC PROJECT (AI-Assisted recruitment simulation system)"
    node -e "console.log('✅ AI Recruitment Simulation Pipeline Connected Successfully!')"
  displayName: "Run Test Script"

# Step 4: Run your project (optional check)
- script: |
    cd "SC PROJECT (AI-Assisted recruitment simulation system)"
    node server.js
  displayName: "Run Project Server"
  continueOnError: true

# Step 5: Publish artifacts (store build output / code)
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(System.DefaultWorkingDirectory)'
    ArtifactName: 'AIRecruitmentProject'
    publishLocation: 'Container'
  displayName: "Publish Project Artifacts"
